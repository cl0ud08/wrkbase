name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Default checkout is a shallow, single-commit clone — gitleaks
          # would only ever see the latest commit, silently never scanning
          # the rest of history at all. fetch-depth: 0 pulls full history
          # so a secret committed and later deleted still gets caught; the
          # commit that introduced it is permanently in this public repo's
          # history either way, and deleting the file today doesn't
          # un-leak it.
          fetch-depth: 0

      # Fails on any real finding, no --audit-level-style carve-out, on
      # purpose — this is a different risk shape than a dependency CVE.
      # A CVE is theoretical until proven exploitable against how you
      # actually use the vulnerable code, and a fix may genuinely not
      # exist yet (see the npm audit step). A leaked secret has none of
      # that ambiguity: the instant it's in git history — especially in a
      # public repo like this one — it must be treated as already
      # compromised, full stop, regardless of whether the finding "looks"
      # exploitable. Known false positives (a placeholder in a docs
      # example, a dev-only dummy value) get an explicit, reviewed
      # .gitleaks.toml allowlist entry if one is ever needed — not a
      # softened default that lets a real leak blend into ignorable noise.
      #
      # The upstream zricethezav/gitleaks image invoked directly via
      # `docker run`, not the gitleaks/gitleaks-action marketplace action
      # (uncertain licensing terms) and not the docker://image step
      # syntax (args-nesting behavior not worth risking getting subtly
      # wrong in YAML with no local way to verify it). A plain `run:`
      # step is exactly the command already run and verified locally
      # (18 commits, ~536KB scanned, no leaks found) before wiring it in
      # — same image, same flags, nothing to trust blind.
      - name: Scan full history for secrets (gitleaks)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --log-opts="--all" --redact -v

  backend:
    name: Backend (lint, migrate, RLS/auth proof, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      POSTGRES_USER: wrkbase
      POSTGRES_PASSWORD: wrkbase_ci_password
      POSTGRES_DB: wrkbase
      APP_DB_USER: wrkbase_app
      APP_DB_PASSWORD: wrkbase_app_ci_password
      DATABASE_URL: postgresql+asyncpg://wrkbase_app:wrkbase_app_ci_password@localhost:5432/wrkbase
      ADMIN_DATABASE_URL: postgresql+asyncpg://wrkbase:wrkbase_ci_password@localhost:5432/wrkbase
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-do-not-use-outside-ci
      CORS_ORIGINS: http://localhost:3000
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wrkbase
          POSTGRES_PASSWORD: wrkbase_ci_password
          POSTGRES_DB: wrkbase
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wrkbase -d wrkbase"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fails on ANY known CVE in a pinned version, deliberately strict —
      # unlike the npm audit step in the frontend job below, there's no
      # --audit-level=high carve-out here. Reasoning: every finding this
      # step has actually caught so far (see CHANGELOG.md) had a real fix
      # version available — this is a young, actively-maintained Python
      # dependency set, not a deep npm-style transitive tree where an
      # unfixable moderate finding sitting in some bundler's own internals
      # is a routine, unavoidable occurrence. Strict-by-default is the
      # right call until that assumption stops holding; if a genuinely
      # unfixable finding shows up, the fix is an explicit, commented
      # `--ignore-vuln <ID>` here — a deliberate, reviewed exception, not
      # a silent downgrade to warn-only that nobody would notice going
      # stale.
      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

      # ruff over flake8: one Rust-speed tool instead of
      # flake8+isort+pyupgrade, and it's already what we validated locally.
      - name: Lint (ruff)
        run: ruff check .

      - name: Run database migrations
        run: alembic upgrade head

      - name: Seed dev data (verify_rls.py expects it)
        run: python -m scripts.seed

      # The single most important proof in this repo: default-deny with no
      # tenant context, strict cross-org read isolation, and a cross-tenant
      # write rejected by WITH CHECK. Its own step, clearly labeled, so a
      # failure here is never mistaken for an ordinary test flake.
      - name: Verify RLS tenant isolation
        run: python -m scripts.verify_rls

      - name: Start API server for the auth+RLS integration proof
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 1
          done
          echo "API did not become healthy in time" >&2
          exit 1

      # Proves auth + RLS are wired together, not just each correct in
      # isolation: real HTTP signup/login/refresh-rotation/logout across two
      # separate orgs. Also its own step for the same reason as above.
      - name: Verify auth + RLS integration
        run: python -m scripts.verify_auth_rls

      - name: Reset rate limiter (password reset)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Password reset: the enumeration-safe response (identical shape for
      # a real vs. nonexistent email), reuse/expiry rejection, and the part
      # with real security consequences if it's wrong — every outstanding
      # refresh token actually dies on reset, not just the password.
      - name: Verify password reset
        run: python -m scripts.verify_password_reset

      - name: Reset rate limiter (email verification)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Email verification: the invite-skips-verification decision, the
      # soft-nudge-not-a-gate decision (an unverified user can do
      # everything a verified one can), reuse/expiry rejection, and that a
      # resend genuinely invalidates the prior token rather than letting
      # two live ones coexist.
      - name: Verify email verification
        run: python -m scripts.verify_email_verification

      # First proof that a resource beyond auth inherits tenant isolation
      # for free from the existing get_current_auth + RLS wiring: org A
      # directly GETs/PATCHes org B's real project ID by guessing it, not
      # just checks it's absent from a list.
      - name: Verify projects tenant isolation
        run: python -m scripts.verify_projects_rls

      # Every proof script below signs up multiple orgs over real HTTP, and
      # /auth/signup is rate-limited to 10/minute per IP (deliberately, to
      # resist brute-forcing — see the rate-limiting slice). All these
      # scripts run from the same runner IP in quick succession, so their
      # signup counts stack on one shared budget: by itself that's already
      # 2 (auth) + 2 (projects) = 4 above, and tickets (2) + workflow (2) +
      # invites (7, the most signup-heavy script here) would push the total
      # to 15 — over the limit deterministically, not flakily, since a CI
      # job runs these steps in seconds. This doesn't test the rate limiter
      # itself (no proof script here asserts anything about it), so
      # resetting Redis between steps below doesn't weaken any real
      # security proof — it just stops unrelated proof scripts from
      # cross-talking on a shared IP-keyed budget that only exists because
      # of how CI happens to run them back-to-back.
      - name: Reset rate limiter (tickets)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Composite-FK tenant/scope consistency (parent_id, project_id) on
      # top of RLS, plus the subtask-parent-type business rule and the
      # /tree hierarchy endpoint.
      - name: Verify tickets tenant isolation
        run: python -m scripts.verify_tickets_rls

      - name: Reset rate limiter (workflow states)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Configurable board columns + the workflow_state_id/position move
      # path, including the move-vs-edit authorization split.
      - name: Verify workflow-state tenant isolation
        run: python -m scripts.verify_workflow_rls

      - name: Reset rate limiter (sprints)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Backlog + Sprints + story points: cross-org and cross-project
      # sprint access, the single-active-sprint constraint under an actual
      # concurrent race (not just a sequential check), paginated backlog,
      # server-computed sprint totals, and complete_sprint's auto-return
      # of unfinished tickets to the backlog.
      - name: Verify sprints tenant isolation + single-active-sprint race
        run: python -m scripts.verify_sprints_rls

      - name: Reset rate limiter (invites)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Team invites + member management: an invite token deterministically
      # joins its own org (never a different one), a tampered token is
      # rejected, an invite is bound to a specific email, only admins can
      # manage invites/members, and the last-admin-removal guard actually
      # blocks the lockout it exists to prevent.
      - name: Verify invites + member management
        run: python -m scripts.verify_invites_rls

      - name: Reset rate limiter (websocket handshake)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Phase 2 slice 1: the WebSocket handshake itself. Four ways in are
      # proven rejected at the handshake -- no ticket, an invalid ticket, a
      # mismatched Origin (CSWSH), and a valid ticket for a project the
      # caller's org can't reach -- plus a reused ticket (replay) and the
      # real happy path, which also has to survive a short idle period and
      # close cleanly.
      - name: Verify WebSocket handshake auth
        run: python -m scripts.verify_ws

      - name: Reset rate limiter (websocket pub/sub)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # A second, independent uvicorn process on a different port, sharing
      # only Postgres and Redis with the one started above -- not a second
      # copy for load, a deliberate test double. verify_ws_pubsub.py routes
      # one WebSocket connection through this process and the mutating
      # PATCH through the other; if the event still arrives, it travelled
      # through Redis, not this job's one shared Python process's memory,
      # which is the entire thing this proof exists to rule out.
      - name: Start a second API process for the pub/sub fan-out proof
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && exit 0
            sleep 1
          done
          echo "Second API process did not become healthy in time" >&2
          exit 1

      # Phase 2 slice 2: ticket-update events actually fan out over Redis
      # pub/sub -- across the two separate processes above, not just within
      # one -- confirmed via PUBSUB NUMSUB (not assumed) that a connection
      # is a real subscriber and that a disconnect actually removes it, and
      # that a mutation on an unrelated project is never received.
      - name: Verify WebSocket pub/sub fan-out
        run: python -m scripts.verify_ws_pubsub

      - name: Reset rate limiter (notifications)
        run: python -c "import os, redis; redis.from_url(os.environ['REDIS_URL']).flushall()"

      # Phase 2 slice 3: notifications created at both real trigger points
      # (assignment, invite acceptance) with the right payload, isolated by
      # org AND by recipient specifically (not just org -- the actual
      # privacy boundary notifications' per-command RLS, migration 0016, is
      # built around), delivered live over the new /ws/notifications room
      # to the right user only, and never leaking onto the unrelated
      # project board channel even for the exact same mutating request.
      - name: Verify notifications
        run: python -m scripts.verify_notifications

      - name: Run pytest suite (if any test files exist yet)
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest -v
          else
            echo "No pytest test files yet — nothing to run."
          fi

  frontend:
    name: Frontend (lint, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      # Read by next.config.ts's rewrite proxy; no real API needs to be
      # running for lint/type-check/build, just a syntactically valid value.
      API_INTERNAL_URL: http://localhost:8000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # --audit-level=high, not the npm default (which fails on any
      # finding including low/moderate): the npm ecosystem's deep
      # transitive trees mean moderate findings buried in some tool's own
      # internal bundled dependency are common and frequently have no fix
      # available yet, unlike the backend's pip-audit step above, which is
      # strict with no carve-out. Concrete example already living in this
      # tree, not a hypothetical: Next.js 16.2.10 (the latest stable
      # release as of this writing) bundles postcss@8.4.31 internally
      # (GHSA-qx2v-qp2m-jg93, moderate, XSS via unescaped `</style>` in
      # CSS stringify output) — `npm audit fix --force` "fixes" it by
      # downgrading to next@9.3.3, a multi-year regression, not a real
      # fix. No stable Next.js release has bumped this yet. The actual
      # exploitability here is low regardless: this postcss instance only
      # ever compiles our own authored Tailwind source at build time, not
      # untrusted CSS supplied at runtime, which is the scenario the
      # advisory describes. Tracked, accepted, not silently ignored —
      # revisit when Next.js ships a stable release with a patched
      # postcss. A HIGH or CRITICAL finding, here or anywhere else in the
      # tree, still fails this step.
      - name: Dependency vulnerability scan (npm audit)
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
